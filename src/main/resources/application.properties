# ==============================================
#   BANKING API - Application Configuration
# ==============================================

spring.application.name=banking-api
server.port=8080

# ==============================================
#   DATABASE - H2 (Default - No Setup Required)
#   Works out of the box for demo and testing.
#   Visit H2 Console: http://localhost:8080/h2-console
#     JDBC URL  : jdbc:h2:mem:bankingdb
#     User      : sa
#     Password  : (leave blank)
# ==============================================
spring.datasource.url=jdbc:h2:mem:bankingdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==============================================
#   DATABASE - MySQL (Production)
#   To switch to MySQL:
#   1. Comment out the H2 section above
#   2. Uncomment the MySQL section below
#   3. Create database: CREATE DATABASE banking_db;
# ==============================================
# spring.datasource.url=jdbc:mysql://localhost:3306/banking_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=your_password
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# spring.h2.console.enabled=false

# ==============================================
#   JPA / HIBERNATE
# ==============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==============================================
#   JWT CONFIGURATION
# ==============================================
# Secret key must be at least 32 characters (256-bit for HS256)
app.jwt.secret=BankingApiSuperSecretKeyForJWTSigning2024SecureKey
# Token expiration: 86400000 ms = 24 hours
app.jwt.expiration-ms=86400000

# ==============================================
#   SWAGGER / OPENAPI
#   Visit: http://localhost:8080/swagger-ui.html
# ==============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ==============================================
#   LOGGING
# ==============================================
logging.level.com.banking=DEBUG
logging.level.org.springframework.security=WARN
